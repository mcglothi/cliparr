---
- name: Deploy Cliparr Dockge stack on TrueNAS
  hosts: truenas
  become: yes
  vars:
    dockge_stacks_dir: /mnt/.ix-apps/app_mounts/dockge/stacks
    stack_name: cliparr
    stack_dir: "{{ dockge_stacks_dir }}/{{ stack_name }}"
    local_repo_root: "{{ lookup('env', 'CLIPARR_REPO_ROOT') | default('/Users/mcglothi/Code/cliparr', true) }}"
  tasks:
    - name: Ensure stack directory exists
      file:
        path: "{{ stack_dir }}"
        state: directory
        mode: "0755"

    - name: Sync Cliparr repository into Dockge stack dir
      synchronize:
        src: "{{ local_repo_root }}/"
        dest: "{{ stack_dir }}"
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"

    - name: Ensure env exists from example
      copy:
        src: "{{ stack_dir }}/.env.example"
        dest: "{{ stack_dir }}/.env"
        remote_src: true
        force: no

    - name: Copy TrueNAS compose as Dockge stack compose.yaml
      copy:
        src: "{{ stack_dir }}/ops/compose/docker-compose.truenas.yaml"
        dest: "{{ stack_dir }}/compose.yaml"
        remote_src: true
        force: true

    - name: Build and start Cliparr stack
      shell: cd {{ stack_dir }} && docker compose pull && docker compose up -d --build
      args:
        chdir: "{{ stack_dir }}"
