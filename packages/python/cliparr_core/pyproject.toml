[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cliparr-core"
version = "0.1.0"
description = "Shared plugin and security primitives for Cliparr"
requires-python = ">=3.10"
dependencies = [
  "pydantic>=2.8.0",
  "cryptography>=44.0.2",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["cliparr_core*"]
